<!DOCTYPE html>
<html>

<head>
  <title>Dog Adoption Application</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<form method="post">

  <h2>Dog Adoption Application</h2>

  <!-- Name -->
  <label for="name">Name</label>
  <input type="text" id="name" name="name" placeholder="Name">

  <!-- Phone -->
  <label for="phone">Phone Number</label>
  <input type="text" id="phone" name="phone" placeholder="Phone Number">

  <!-- Address -->
  <label for="address">Address</label>
  <input type="text" id="address" name="address" placeholder="Address">

  <!-- Checkbox -->
  <input type="checkbox" id="checkbox" name="dogExperience" value="Have you ever lived with a Dog before?">
  <label for="checkbox">Have you ever lived with a Dog before?</label>

  <br><br>

  <!-- Multi-select -->
  <label for="multiSelect">Please select your preferred breeds</label>
  <select id="multiSelect" name="breeds" multiple size="3">
    <option value="beagle">Beagle</option>
    <option value="poodle">Poodle</option>
    <option value="golden">Golden Retriever</option>
  </select>

  <br><br>

  <!-- Submit -->
  <input type="submit" value="Submit" id="submit">

</form>

</body>

</html>
